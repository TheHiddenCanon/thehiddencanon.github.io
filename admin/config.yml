backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "articles"
    label: "Άρθρα"
    folder: "articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Τίτλος", name: "title", widget: "string" }
      - { label: "Υπότιτλος", name: "subtitle", widget: "string", required: false }
      - { label: "Κατηγορία", name: "category", widget: "select", options: ["Ερμητισμός", "Αρχαία Αίγυπτος", "Αλχημεία", "Μυστηριακές Σχολές", "Βιβλιοκριτική", "Εσωτερική Ιστορία", "Αποκρυφισμός"] }
      - { label: "Ημερομηνία", name: "date", widget: "datetime" }
      - { label: "Χρόνος ανάγνωσης (λεπτά)", name: "readtime", widget: "number", default: 8 }
      - { label: "Περίληψη (για την αρχική)", name: "excerpt", widget: "text" }
      - { label: "Δημοσιευμένο", name: "published", widget: "boolean", default: true }
      - { label: "Featured (αρχική σελίδα)", name: "featured", widget: "boolean", default: false }
      - { label: "Περιεχόμενο", name: "body", widget: "markdown" }
