<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Άρθρο | The Hidden Canon</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<!-- Marked.js for markdown parsing -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  .article-hero {
    position: relative;
    padding: 7rem 3rem 5rem;
    max-width: 860px;
    margin: 0 auto;
    text-align: center;
  }
  .article-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, transparent, var(--gold-dim));
  }
  .article-category {
    font-size: 0.58rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2rem;
    display: inline-flex;
    align-items: center;
    gap: 1rem;
  }
  .article-category::before,
  .article-category::after { content: ''; width: 24px; height: 1px; background: var(--gold-dim); }

  .article-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.2rem, 5vw, 4rem);
    line-height: 1.08;
    color: var(--white);
    margin-bottom: 1rem;
  }
  .article-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.15rem;
    color: #7a7060;
    margin-bottom: 3rem;
  }
  .article-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--grey);
    flex-wrap: wrap;
  }
  .meta-dot { width: 3px; height: 3px; background: var(--gold-dim); border-radius: 50%; }

  /* Article body */
  .article-body {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 3rem 6rem;
  }
  .article-body p {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.18rem;
    line-height: 1.88;
    color: var(--text);
    margin-bottom: 1.8rem;
  }
  .article-body p:first-of-type::first-letter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4.8rem;
    font-weight: 600;
    float: left;
    line-height: 0.72;
    margin-right: 0.1em;
    margin-top: 0.1em;
    color: var(--gold);
  }
  .article-body h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.6rem;
    letter-spacing: 0.06em;
    color: var(--white);
    margin: 3.5rem 0 1.2rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid rgba(201,168,76,0.14);
  }
  .article-body h3 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 1.2rem;
    color: var(--gold-light);
    margin: 2rem 0 0.8rem;
  }
  .article-body em { color: var(--gold-light); font-style: italic; }
  .article-body strong { color: var(--white); font-weight: 500; }
  .article-body hr {
    border: none;
    border-top: 1px solid rgba(201,168,76,0.1);
    margin: 3rem 0;
  }
  .article-body blockquote {
    border-left: 2px solid var(--gold);
    margin: 2.5rem 0;
    padding: 1.2rem 2rem;
    background: rgba(201,168,76,0.025);
  }
  .article-body blockquote p {
    font-style: italic;
    font-size: 1.3rem !important;
    color: var(--white) !important;
    margin-bottom: 0 !important;
  }
  .article-body blockquote p::first-letter { all: unset !important; float: none !important; }

  .article-body a { color: var(--gold); text-decoration: none; border-bottom: 1px solid rgba(201,168,76,0.3); }
  .article-body a:hover { border-color: var(--gold); }

  /* Loading state */
  .loading {
    text-align: center;
    padding: 6rem 3rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--gold-dim);
    font-size: 1.2rem;
  }

  /* Tags */
  .article-tags {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 3rem 3rem;
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 0.52rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.18);
    padding: 0.32rem 0.8rem;
  }

  .back-link {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 3rem 5rem;
  }
  .back-link a {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .back-link a::before { content: '←'; }
  .back-link a:hover { color: var(--gold-light); }

  @media (max-width: 768px) {
    .article-hero { padding: 5rem 1.5rem 3rem; }
    .article-body, .article-tags, .back-link { padding-left: 1.5rem; padding-right: 1.5rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">The Hidden Canon</a>
  <ul class="nav-links">
    <li><a href="index.html">Αρχική</a></li>
    <li><a href="articles.html" class="active">Άρθρα</a></li>
    <li><a href="about.html">Σχετικά</a></li>
  </ul>
  <a href="index.html#subscribe" class="nav-subscribe">Εγγραφή</a>
</nav>

<!-- Dynamic content injected here -->
<div id="article-container">
  <div class="loading">Φόρτωση άρθρου...</div>
</div>

<div id="subscribe" class="subscribe-section">
  <h2>Εισέλθετε στον Κανόνα</h2>
  <p>Νέα τεύχη κάθε μήνα. Ελεύθερη πρόσβαση για όλους.</p>
  <form name="newsletter" method="POST" data-netlify="true" class="subscribe-form">
    <input type="email" name="email" placeholder="email@παράδειγμα.gr" required autocomplete="email">
    <button type="submit">Εγγραφή</button>
  </form>
</div>

<footer>
  <div class="footer-logo">The Hidden Canon</div>
  <div class="footer-text">✦ Omnia in Mentis ✦</div>
</footer>

<script>
  // Parse frontmatter from markdown
  function parseFrontmatter(text) {
    const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
    if (!match) return { meta: {}, content: text };

    const meta = {};
    match[1].split('\n').forEach(line => {
      const [key, ...vals] = line.split(':');
      if (key && vals.length) {
        let val = vals.join(':').trim().replace(/^["']|["']$/g, '');
        // Handle booleans
        if (val === 'true') val = true;
        if (val === 'false') val = false;
        meta[key.trim()] = val;
      }
    });

    return { meta, content: match[2] };
  }

  // Format date
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('el-GR', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  // Load and render article
  async function loadArticle() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      window.location.href = 'articles.html';
      return;
    }

    try {
      const res = await fetch(`articles/${slug}.md`);
      if (!res.ok) throw new Error('Article not found');
      const text = await res.text();
      const { meta, content } = parseFrontmatter(text);

      // Update page title
      document.title = `${meta.title || 'Άρθρο'} | The Hidden Canon`;

      // Render HTML
      const html = `
        <div class="article-hero">
          <div class="article-category">${meta.category || 'The Hidden Canon'} · Τεύχος Ι</div>
          <h1 class="article-title">${meta.title || ''}</h1>
          ${meta.subtitle ? `<p class="article-subtitle">${meta.subtitle}</p>` : ''}
          <div class="article-meta">
            <span>The Hidden Canon</span>
            <div class="meta-dot"></div>
            <span>${formatDate(meta.date)}</span>
            <div class="meta-dot"></div>
            <span>~${meta.readtime || 8} λεπτά ανάγνωση</span>
          </div>
        </div>

        <div class="ornament">
          <div class="ornament-line"></div>
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="9" stroke="#c9a84c" stroke-width="0.5"/>
            <circle cx="10" cy="10" r="2" fill="#c9a84c"/>
            <line x1="10" y1="1" x2="10" y2="5" stroke="#c9a84c" stroke-width="0.5"/>
            <line x1="10" y1="15" x2="10" y2="19" stroke="#c9a84c" stroke-width="0.5"/>
            <line x1="1" y1="10" x2="5" y2="10" stroke="#c9a84c" stroke-width="0.5"/>
            <line x1="15" y1="10" x2="19" y2="10" stroke="#c9a84c" stroke-width="0.5"/>
          </svg>
          <div class="ornament-line right"></div>
        </div>

        <div class="article-body">
          ${marked.parse(content)}
        </div>

        <div class="article-tags">
          <span class="tag">${meta.category || ''}</span>
          <span class="tag">The Hidden Canon</span>
        </div>

        <div class="back-link">
          <a href="articles.html">Πίσω στα Άρθρα</a>
        </div>
      `;

      document.getElementById('article-container').innerHTML = html;

    } catch(e) {
      document.getElementById('article-container').innerHTML = `
        <div class="loading">
          Το άρθρο δεν βρέθηκε.<br><br>
          <a href="articles.html" style="color:var(--gold);">← Πίσω στα Άρθρα</a>
        </div>
      `;
    }
  }

  loadArticle();
</script>

</body>
</html>
